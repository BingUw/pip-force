<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header svg { flex-shrink: 0; }
    .header h3 {
      font-size: 16px;
      color: #1a73e8;
      font-weight: 600;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #1557b0; }
    .btn:active { background: #0d47a1; }
    .info {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }
    kbd {
      background: #f1f3f4;
      border: 1px solid #dadce0;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#1a73e8">
      <path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/>
    </svg>
    <h3>Force PiP</h3>
  </div>
  <button class="btn" id="togglePip">切换画中画</button>
  <div class="info">
    <p>快捷键：<kbd>Alt</kbd> + <kbd>P</kbd></p>
    <p>检测到视频时，页面右下角会出现蓝色浮动按钮。</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
